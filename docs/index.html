<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The Daily AI — Architecture</title>
<meta name="description" content="How The Daily AI works: how it reads your work, why there's no search index, and the agentic loop.">
<style>
  :root {
    --paper: #FAF8F3; --ink: #11110F; --subtle: #5C5A52; --hair: #E2DED3;
    --accent: #1B3BFF; --soft: #EAEEFF;
    --serif: Georgia, "Times New Roman", serif;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    --mono: "SFMono-Regular", Menlo, Consolas, monospace;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--paper); color: var(--ink); font-family: var(--sans); line-height: 1.6; }
  .wrap { max-width: 820px; margin: 0 auto; padding: 0 20px 80px; }
  header.masthead { text-align: center; padding: 44px 20px 8px; }
  header.masthead .kick { font-family: var(--mono); font-size: 12px; letter-spacing: 2px; text-transform: uppercase; color: var(--subtle); }
  header.masthead h1 { font-family: var(--serif); font-weight: 700; font-size: 40px; letter-spacing: -0.5px; margin: 6px 0 0; }
  header.masthead .sub { font-family: var(--serif); font-style: italic; color: var(--subtle); margin-top: 6px; }
  .rule { border-top: 3px double var(--ink); max-width: 820px; margin: 18px auto 0; }
  #content h1 { display: none; } /* the doc's own H1 (masthead handles the title) */
  #content h2 { font-family: var(--serif); font-size: 26px; font-weight: 700; margin: 42px 0 6px; padding-top: 18px; border-top: 1px solid var(--hair); }
  #content h2:first-of-type { border-top: 0; }
  #content h3 { font-family: var(--serif); font-size: 19px; margin: 24px 0 4px; }
  #content p, #content li { font-size: 16.5px; }
  #content a { color: var(--accent); text-decoration: none; }
  #content a:hover { text-decoration: underline; }
  #content blockquote { border-left: 3px solid var(--accent); margin: 18px 0; padding: 2px 0 2px 16px; color: var(--ink); background: transparent; font-size: 17px; }
  #content code { font-family: var(--mono); font-size: 0.9em; background: #f0ede6; padding: 1px 5px; border-radius: 4px; }
  #content pre.mermaid code, #content .mermaid code { background: none; padding: 0; }
  #content table { border-collapse: collapse; width: 100%; margin: 16px 0; font-size: 15px; }
  #content th, #content td { border: 1px solid var(--hair); padding: 8px 12px; text-align: left; vertical-align: top; }
  #content th { background: var(--soft); font-family: var(--mono); font-size: 12px; letter-spacing: 0.5px; text-transform: uppercase; }
  #content hr { border: 0; border-top: 1px solid var(--hair); margin: 32px 0; }
  .mermaid { text-align: center; margin: 22px 0; overflow-x: auto; }
  .loading { text-align: center; color: var(--subtle); font-family: var(--mono); font-size: 13px; padding: 40px; }
  footer { text-align: center; font-family: var(--mono); font-size: 12px; color: var(--subtle); margin-top: 40px; }
  footer a { color: var(--accent); text-decoration: none; }
</style>
</head>
<body>
  <header class="masthead">
    <div class="kick">The Daily AI</div>
    <h1>Architecture</h1>
    <div class="sub">How it reads your work, why there's no search index, and the agentic loop.</div>
  </header>
  <div class="rule"></div>
  <div class="wrap">
    <div id="content"><p class="loading">Loading…</p></div>
    <footer>
      <a href="https://github.com/Ishtiaqhossain/the-daily-ai">github.com/Ishtiaqhossain/the-daily-ai</a>
    </footer>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
  <script type="module">
    import mermaid from "https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs";
    mermaid.initialize({
      startOnLoad: false,
      theme: "base",
      themeVariables: {
        primaryColor: "#EAEEFF", primaryBorderColor: "#1B3BFF", primaryTextColor: "#11110F",
        lineColor: "#5C5A52", fontFamily: "Georgia, serif", fontSize: "15px",
        clusterBkg: "#FFFFFF", clusterBorder: "#E2DED3",
      },
    });
    try {
      const md = await (await fetch("architecture.md")).text();
      const el = document.getElementById("content");
      el.innerHTML = marked.parse(md);
      // Turn ```mermaid code blocks into rendered diagrams.
      el.querySelectorAll("code.language-mermaid").forEach((code) => {
        const div = document.createElement("div");
        div.className = "mermaid";
        div.textContent = code.textContent;
        (code.closest("pre") || code).replaceWith(div);
      });
      await mermaid.run({ querySelector: ".mermaid" });
    } catch (e) {
      document.getElementById("content").innerHTML =
        '<p class="loading">Couldn’t load the doc. Read it on ' +
        '<a href="https://github.com/Ishtiaqhossain/the-daily-ai/blob/main/docs/architecture.md">GitHub</a>.</p>';
    }
  </script>
</body>
</html>
